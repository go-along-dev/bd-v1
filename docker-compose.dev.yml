version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: goalong_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goalong
      POSTGRES_PASSWORD: goalong_secret
      POSTGRES_DB: goalong_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goalong"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: goalong_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: goalong
      MONGO_INITDB_ROOT_PASSWORD: goalong_secret
      MONGO_INITDB_DATABASE: goalong_chat
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data: